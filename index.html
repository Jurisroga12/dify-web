<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Sarunbots</title>
<style>
#izvele{
    position: sticky;
    top: 0;
}
</style>
</head>
<body>
<button onclick="izveleties('Lietu bibliotēka')">Lietu bibliotēka</button>
<button onclick="izveleties('Aplikācija makšķerniekiem')">Aplikācija makšķerniekiem</button>
<button onclick="izveleties('Sociālais tīkls senioriem')">Sociālais tīkls senioriem</button>
<button onclick="izveleties('Tiešās pirkšanas pulciņš')">Tiešās pirkšanas pulciņš</button>
<div id="izvele">Izvēlētā sistēma: Nav izvēlēta</div>
<div class="chat-container">
<iframe
 src="https://udify.app/chatbot/qidj5gJOj0YGN7i0"
 style="width: 100%; height: 90%; min-height: 90vh"
 frameborder="0"
 allow="microphone">
</iframe>
</div>
<script>
function izveleties(name){
    document.getElementById("izveleties").innerText = "Izvēlētā sistēma: " + name;
}
</script>
</body>
</html>
